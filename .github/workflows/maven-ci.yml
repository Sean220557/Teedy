name: Maven CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y -q --no-install-recommends install ffmpeg mediainfo tesseract-ocr tesseract-ocr-eng

      - name: Test and generate reports
        run: mvn --batch-mode clean test jacoco:report site -Dmaven.test.failure.ignore=true

      - name: Package artifacts
        run: mvn --batch-mode -Pprod package -DskipTests

      - name: Upload site documentation
        uses: actions/upload-artifact@v4
        with:
          name: maven-site
          path: '**/target/site/**'

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teedy-binaries
          path: |
            **/target/*.jar
            **/target/*.war
